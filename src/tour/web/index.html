<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1d27">
  <title>Tour of go2cs</title>
  <link rel="icon" href="/assets/go2cs.ico">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img src="/assets/go2cs-small.png" alt="" width="124" height="63">
      <strong>Tour of go2cs</strong>
      <span>Reads like Go. Runs like Go.</span>
    </div>
    <div class="header-status" aria-live="polite">
      <i id="connection-dot"></i>
      <span id="connection-label">Connecting to Tour of Go</span>
    </div>
  </header>

  <main class="workspace" id="workspace">
    <section class="tour-pane" aria-label="Tour of Go">
      <iframe
        id="tour-frame"
        title="Official Tour of Go"
        src="/tour/welcome/1"
        allow="clipboard-write"
      ></iframe>
    </section>

    <div
      class="column-divider"
      id="column-divider"
      role="separator"
      aria-label="Resize Go and .NET panes"
      aria-orientation="vertical"
      aria-valuemin="45"
      aria-valuemax="80"
      aria-valuenow="67"
      tabindex="0"
    ></div>

    <section class="dotnet-pane" aria-label="Generated .NET">
      <div class="dotnet-toolbar">
        <div class="dotnet-title">
          <span class="cs-badge">C#</span>
          <div>
            <strong id="lesson-label">Generated .NET</strong>
            <span id="conversion-status">Waiting for Go source</span>
          </div>
        </div>
        <div class="actions">
          <button id="convert-button" class="button secondary" type="button" disabled>Convert</button>
          <button id="run-button" class="button primary" type="button" disabled>Run</button>
        </div>
      </div>

      <div class="source-tabs" role="tablist" aria-label="Generated files">
        <button id="code-tab" role="tab" type="button" data-view="code" aria-selected="true">Code</button>
        <button id="project-tab" role="tab" type="button" data-view="project" aria-selected="false">Project</button>
      </div>

      <div class="source-area">
        <pre id="code-view" class="source-view" tabindex="0" role="tabpanel" aria-labelledby="code-tab"><code>// C# appears automatically when a Tour page opens.</code></pre>
        <pre id="project-view" class="source-view" tabindex="0" role="tabpanel" aria-labelledby="project-tab" hidden><code>&lt;!-- The generated project file appears here. --&gt;</code></pre>
      </div>

      <section class="output-panel" aria-label="Conversion and .NET output">
        <div class="output-tabs" role="tablist" aria-label="Output type">
          <button role="tab" type="button" data-output="transpile" aria-selected="true">Transpile</button>
          <button role="tab" type="button" data-output="build" aria-selected="false">Build</button>
          <button role="tab" type="button" data-output="run" aria-selected="false">.NET Run</button>
          <span id="output-timing"></span>
        </div>
        <pre id="output-view" tabindex="0">Open a Tour page to convert its Go code.</pre>
      </section>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
